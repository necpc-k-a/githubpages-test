<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>エビデンスエクセル生成</title>
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://stuk.github.io/jszip/dist/jszip.min.js"></script>
    <script src="./js/CreateExcel.js"></script>
    <!-- bootstrapのみで出来ない部分を記載 -->
    <style>
        table > tbody, tr, td {
            border: 1px solid black;
        }

        table td:first-child {
            width: 140px !important;
            display: block;
        }

        table td:not(:first-child) {
            width: 200px;
        }

        div.row.d-flex.flex-nowrap.overflow-x-scroll.pb-2.bg-secondary-subtle>.active {
            background-color: #ccc;
        }
    </style>
</head>

<body class="mt-3">
    <div class="container">
        <div class="row flex-column gap-3">
            <div class="col-12">
                <label for="examSpecificationNameInput" class="form-label">試験仕様書名</label>
                <input id="examSpecificationNameInput" type="text" class="form-control" />
            </div>
            <div class="col-12 mb-3" id="headerSheetWrap">
            </div>
        </div>
        <div class="row mb-3 overflow-x-scroll overflow-y-scroll d-block" id="sheetTableWrap"></div>
        <div class="row d-flex flex-nowrap overflow-x-scroll pb-2 bg-secondary-subtle" id="sheetTabWrap"></div>
        <hr>
        <div class="row">
            <div class="d-flex gap-3 mb-2">
                <button type="button" class="btn btn-outline-primary"
                    id="attachmentEvidencefileBtn">エビデンスファイル添付</button>
                <button type="button" class="btn btn-outline-primary" disabled id="dlExcel">テーブルの内容をExcel化</button>
                <!-- TODO: 確認用でボタンを配置 -->
                <button type="button" class="btn btn-outline-secondary" id="excelDl"
                    title="TODO: 確認用でボタンを表示">テンプレートエクセルDL</button>
            </div>
        </div>

        <div id="loading" class="d-flex justify-content-center">

        </div>
    </div>

    <!-- 他js読み込みと実行 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/functions.js"></script>
    <script src="./js/main.js"></script>
</body>

</html>
